suite: test extraVolumes and extraVolumeMounts support
templates:
  - templates/aggregator-deploy.yaml
  - templates/agent-deploy.yaml
  - templates/agent-daemonset.yaml
  - templates/config-loader-job.yaml
  - templates/webhook-deploy.yaml
  - templates/backfill-job.yaml
tests:
  - it: should add extra volumes and mounts to the aggregator deployment
    set:
      clusterName: "test-cluster"
      cloudAccountId: "123456789"
      region: "us-east-1"
      existingSecretName: "cloudzero-api-key"
      apiKey: null
      extraVolumes:
        - name: custom-extra-volume
          configMap:
            name: custom-extra-config
      extraVolumeMounts:
        - name: custom-extra-volume
          mountPath: /opt/custom-extra
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-extra-volume
            configMap:
              name: custom-extra-config
        template: templates/aggregator-deploy.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-extra-volume
            mountPath: /opt/custom-extra
            readOnly: true
        template: templates/aggregator-deploy.yaml
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            name: custom-extra-volume
            mountPath: /opt/custom-extra
            readOnly: true
        template: templates/aggregator-deploy.yaml

  - it: should add extra volumes and mounts to the clustered agent deployment
    set:
      clusterName: "test-cluster"
      cloudAccountId: "123456789"
      region: "us-east-1"
      existingSecretName: "cloudzero-api-key"
      apiKey: null
      extraVolumes:
        - name: custom-extra-volume
          configMap:
            name: custom-extra-config
      extraVolumeMounts:
        - name: custom-extra-volume
          mountPath: /opt/custom-extra
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-extra-volume
            configMap:
              name: custom-extra-config
        template: templates/agent-deploy.yaml
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: custom-extra-volume
            mountPath: /opt/custom-extra
            readOnly: true
        template: templates/agent-deploy.yaml
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            name: custom-extra-volume
            mountPath: /opt/custom-extra
            readOnly: true
        template: templates/agent-deploy.yaml

  - it: should add extra volumes and mounts to webhook and config-loader jobs
    set:
      clusterName: "test-cluster"
      cloudAccountId: "123456789"
      region: "us-east-1"
      existingSecretName: "cloudzero-api-key"
      apiKey: null
      extraVolumes:
        - name: custom-extra-volume
          configMap:
            name: custom-extra-config
      extraVolumeMounts:
        - name: custom-extra-volume
          mountPath: /opt/custom-extra
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-extra-volume
            configMap:
              name: custom-extra-config
        template: templates/webhook-deploy.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-extra-volume
            mountPath: /opt/custom-extra
            readOnly: true
        template: templates/webhook-deploy.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-extra-volume
            configMap:
              name: custom-extra-config
        template: templates/config-loader-job.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-extra-volume
            mountPath: /opt/custom-extra
            readOnly: true
        template: templates/config-loader-job.yaml

  - it: should add extra volumes and mounts in federated mode and backfill
    set:
      clusterName: "test-cluster"
      cloudAccountId: "123456789"
      region: "us-east-1"
      existingSecretName: "cloudzero-api-key"
      apiKey: null
      configmapReload:
        prometheus:
          enabled: false
      defaults:
        federation:
          enabled: true
      extraVolumes:
        - name: custom-extra-volume
          configMap:
            name: custom-extra-config
      extraVolumeMounts:
        - name: custom-extra-volume
          mountPath: /opt/custom-extra
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-extra-volume
            configMap:
              name: custom-extra-config
        template: templates/agent-daemonset.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-extra-volume
            mountPath: /opt/custom-extra
            readOnly: true
        template: templates/agent-daemonset.yaml

  - it: should add extra volumes and mounts to the backfill CronJob
    documentIndex: 0
    set:
      clusterName: "test-cluster"
      cloudAccountId: "123456789"
      region: "us-east-1"
      existingSecretName: "cloudzero-api-key"
      apiKey: null
      extraVolumes:
        - name: custom-extra-volume
          configMap:
            name: custom-extra-config
      extraVolumeMounts:
        - name: custom-extra-volume
          mountPath: /opt/custom-extra
          readOnly: true
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.volumes
          content:
            name: custom-extra-volume
            configMap:
              name: custom-extra-config
        template: templates/backfill-job.yaml

  - it: should add extra volumes and mounts to the backfill one-time Job
    documentIndex: 1
    set:
      clusterName: "test-cluster"
      cloudAccountId: "123456789"
      region: "us-east-1"
      existingSecretName: "cloudzero-api-key"
      apiKey: null
      extraVolumes:
        - name: custom-extra-volume
          configMap:
            name: custom-extra-config
      extraVolumeMounts:
        - name: custom-extra-volume
          mountPath: /opt/custom-extra
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-extra-volume
            configMap:
              name: custom-extra-config
        template: templates/backfill-job.yaml
