suite: test apiKey and existingSecretName validation
templates:
  - aggregator-secret.yaml
tests:
  # ===== Schema validation: top-level (legacy) =====

  - it: should fail when no API key source is configured anywhere
    values:
      - ../values.yaml
    set:
      apiKey: null
      existingSecretName: null
      host: api.cloudzero.com
    asserts:
      - failedTemplate:
          errorPattern: "secretProviderClass"

  - it: should fail when both apiKey and existingSecretName are set
    set:
      apiKey: "test-key-123"
      existingSecretName: "my-secret"
    asserts:
      - failedTemplate:
          errorPattern: "oneOf"

  # ===== Pattern validation =====

  - it: should fail with invalid apiKey characters (spaces)
    set:
      apiKey: "test-key with spaces"
      existingSecretName: null
    asserts:
      - failedTemplate:
          errorPattern: "does not match pattern"

  - it: should fail with apiKey containing invalid special characters (@)
    set:
      apiKey: "test-key@invalid"
      existingSecretName: null
    asserts:
      - failedTemplate:
          errorPattern: "does not match pattern"

  - it: should fail with apiKey containing invalid special characters (#)
    set:
      apiKey: "test#key"
      existingSecretName: null
    asserts:
      - failedTemplate:
          errorPattern: "does not match pattern"

  - it: should fail with apiKey containing invalid special characters ($)
    set:
      apiKey: "test$key"
      existingSecretName: null
    asserts:
      - failedTemplate:
          errorPattern: "does not match pattern"

  # ===== Top-level: successful rendering =====

  - it: should create secret when only apiKey is set (with existingSecretName null)
    set:
      apiKey: "test-key-abc123"
      existingSecretName: null
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-api-key
      - equal:
          path: data.value
          value: dGVzdC1rZXktYWJjMTIz # base64 of "test-key-abc123"

  - it: should create secret when only apiKey is set (existingSecretName omitted)
    values:
      - ../values.yaml
    set:
      apiKey: "test-key-xyz"
      host: api.cloudzero.com
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-api-key
      - isNotEmpty:
          path: data.value

  - it: should not create secret when only existingSecretName is set
    set:
      apiKey: null
      existingSecretName: "my-existing-secret"
    asserts:
      - hasDocuments:
          count: 0

  - it: should accept apiKey with all valid special characters
    set:
      apiKey: "test-KEY_123.abc~def!ghi*jkl'mno()pqr;stu-"
      existingSecretName: null
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-api-key
      - isNotEmpty:
          path: data.value

  - it: should base64 encode the apiKey in the secret
    set:
      apiKey: "my-secret-key"
      existingSecretName: null
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.value
          value: bXktc2VjcmV0LWtleQ== # base64 of "my-secret-key"

  - it: should create secret with hyphen in apiKey
    set:
      apiKey: "test-key-with-hyphens"
      existingSecretName: null
    asserts:
      - isKind:
          of: Secret

  - it: should create secret with underscore in apiKey
    set:
      apiKey: "test_key_with_underscores"
      existingSecretName: null
    asserts:
      - isKind:
          of: Secret

  - it: should create secret with period in apiKey
    set:
      apiKey: "test.key.with.periods"
      existingSecretName: null
    asserts:
      - isKind:
          of: Secret

  # ===== components.apiKey.secretProviderClass =====

  - it: should not create secret when secretProviderClass is set
    set:
      apiKey: null
      existingSecretName: null
      components:
        apiKey:
          secretProviderClass: "my-spc"
    asserts:
      - hasDocuments:
          count: 0

  # ===== Precedence: top-level wins over components.apiKey =====

  - it: should use top-level apiKey even when secretProviderClass is set
    set:
      apiKey: "top-level-key"
      existingSecretName: null
      components:
        apiKey:
          secretProviderClass: "should-be-ignored"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.value
          value: dG9wLWxldmVsLWtleQ== # base64 of "top-level-key"

  - it: should use top-level existingSecretName even when secretProviderClass is set
    set:
      apiKey: null
      existingSecretName: "my-existing-secret"
      components:
        apiKey:
          secretProviderClass: "should-be-ignored"
    asserts:
      - hasDocuments:
          count: 0
