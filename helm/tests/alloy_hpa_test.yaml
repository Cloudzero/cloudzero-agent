suite: test Alloy HPA configuration
templates:
  - templates/agent-hpa.yaml
tests:
  # Test that HPA is not created for Prometheus
  - it: should not create HPA when using Prometheus
    set:
      alloy.enabled: false
      alloy.autoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  # Test that HPA is not created when autoscaling is disabled
  - it: should not create HPA when autoscaling is disabled
    set:
      alloy.enabled: true
      alloy.autoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # Test that HPA is not created in federated mode
  - it: should not create HPA when federation is enabled
    set:
      defaults.federation.enabled: true
      alloy.enabled: true
      alloy.autoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  # Test that HPA is created for Alloy with autoscaling enabled
  - it: should create HPA when Alloy is enabled with autoscaling
    set:
      alloy.enabled: true
      alloy.autoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: apiVersion
          value: autoscaling/v2

  # Test HPA target reference
  - it: should target the correct deployment
    set:
      alloy.enabled: true
      alloy.autoscaling.enabled: true
    asserts:
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: apps/v1
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: RELEASE-NAME-cloudzero-agent-server

  # Test replica configuration
  - it: should use configured min and max replicas
    set:
      alloy.enabled: true
      alloy.autoscaling:
        enabled: true
        minReplicas: 3
        maxReplicas: 20
    asserts:
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 20

  # Test CPU metric configuration
  - it: should configure CPU metric when targetCPUUtilizationPercentage is set
    set:
      alloy.enabled: true
      alloy.autoscaling:
        enabled: true
        targetCPUUtilizationPercentage: 75
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 75

  # Test memory metric configuration
  - it: should configure memory metric when targetMemoryUtilizationPercentage is set
    set:
      alloy.enabled: true
      alloy.autoscaling:
        enabled: true
        targetMemoryUtilizationPercentage: 85
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 85

  # Test both metrics
  - it: should configure both CPU and memory metrics
    set:
      alloy.enabled: true
      alloy.autoscaling:
        enabled: true
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
    asserts:
      - lengthEqual:
          path: spec.metrics
          count: 2
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 70
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 80

  # Test scaling behavior
  - it: should configure scale-down behavior
    set:
      alloy.enabled: true
      alloy.autoscaling.enabled: true
    asserts:
      - equal:
          path: spec.behavior.scaleDown.stabilizationWindowSeconds
          value: 300
      - lengthEqual:
          path: spec.behavior.scaleDown.policies
          count: 2
      - equal:
          path: spec.behavior.scaleDown.selectPolicy
          value: Min

  # Test scale-up behavior
  - it: should configure scale-up behavior
    set:
      alloy.enabled: true
      alloy.autoscaling.enabled: true
    asserts:
      - equal:
          path: spec.behavior.scaleUp.stabilizationWindowSeconds
          value: 0
      - lengthEqual:
          path: spec.behavior.scaleUp.policies
          count: 2
      - equal:
          path: spec.behavior.scaleUp.selectPolicy
          value: Max

  # Test HPA labels
  - it: should have correct labels including component label
    set:
      alloy.enabled: true
      alloy.autoscaling.enabled: true
    asserts:
      - isNotEmpty:
          path: metadata.labels
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: server
