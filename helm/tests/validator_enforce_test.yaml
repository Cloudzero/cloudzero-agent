suite: validator enforce configuration
templates:
  - validator-cm.yaml
tests:
  # ============================================================================
  # Default behavior tests
  # ============================================================================
  - it: should default enforce to false
    asserts:
      - matchRegex:
          path: data["validator.yml"]
          pattern: "name: pre-start\\n\\s+enforce: false\\n"

  # ============================================================================
  # Explicit value tests
  # ============================================================================
  - it: should set enforce to true when explicitly set
    set:
      components.validator.enforce: true
    asserts:
      - matchRegex:
          path: data["validator.yml"]
          pattern: "name: pre-start\\n\\s+enforce: true\\n"

  - it: should set enforce to false when explicitly set
    set:
      components.validator.enforce: false
    asserts:
      - matchRegex:
          path: data["validator.yml"]
          pattern: "name: pre-start\\n\\s+enforce: false\\n"

  # ============================================================================
  # Other stages should remain unchanged
  # ============================================================================
  - it: should keep post-start enforce false regardless of setting
    set:
      components.validator.enforce: true
    asserts:
      - matchRegex:
          path: data["validator.yml"]
          pattern: "name: post-start\\n\\s+enforce: false\\n"

  - it: should keep pre-stop enforce false regardless of setting
    set:
      components.validator.enforce: true
    asserts:
      - matchRegex:
          path: data["validator.yml"]
          pattern: "name: pre-stop\\n\\s+enforce: false\\n"

  - it: should keep config-load enforce false regardless of setting
    set:
      components.validator.enforce: true
    asserts:
      - matchRegex:
          path: data["validator.yml"]
          pattern: "name: config-load\\n\\s+enforce: false\\n"
