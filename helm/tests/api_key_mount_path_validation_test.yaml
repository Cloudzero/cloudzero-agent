suite: test external api key mount path validation
templates:
  - templates/aggregator-deploy.yaml
tests:
  - it: should fail when external mode is enabled and no extraVolumeMount matches serverConfig.containerSecretFilePath
    set:
      apiKey: null
      existingSecretName: null
      extraVolumes:
        - name: custom-extra-volume
          configMap:
            name: custom-extra-config
      extraVolumeMounts:
        - name: custom-extra-volume
          mountPath: /opt/custom-extra
          readOnly: true
    asserts:
      - failedTemplate:
          errorPattern: "containerSecretFilePath"

  - it: should allow external mode when an extraVolumeMount matches serverConfig.containerSecretFilePath
    set:
      apiKey: null
      existingSecretName: null
      extraVolumes:
        - name: custom-extra-volume
          configMap:
            name: custom-extra-config
      extraVolumeMounts:
        - name: custom-extra-volume
          mountPath: /etc/config/secrets
          readOnly: true
    asserts:
      - isKind:
          of: Deployment
