{{/*
CloudZero Agent Operator ServiceAccount

Provides the identity for the operator Deployment pods. The ClusterRoleBinding
grants this ServiceAccount the permissions defined in the operator ClusterRole.
*/}}
{{- if .Values.operator.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cloudzero-agent.internal.resourceName" (dict "context" . "component" "operator") }}
  namespace: {{ .Release.Namespace }}
  {{- include "cloudzero-agent.generateLabels" (dict
      "root" .
      "name" "operator"
      "labels" (list
        .Values.defaults.labels
        .Values.commonMetaLabels
      )
    ) | nindent 2 }}
{{- end }}
