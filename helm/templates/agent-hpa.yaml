{{- if and (include "cloudzero-agent.isAlloy" .) .Values.alloy.autoscaling.enabled (not .Values.defaults.federation.enabled) }}
{{- /*
Horizontal Pod Autoscaler for Grafana Alloy

This HPA only applies when:
1. Using Alloy as the metrics collector (alloy.enabled=true)
2. Autoscaling is enabled (alloy.autoscaling.enabled=true)
3. NOT in federated mode (defaults.federation.enabled=false)

In federated mode, Alloy uses clustering to distribute work, so autoscaling is
controlled by the replica count in the Deployment rather than HPA.

The HPA scales the Alloy deployment based on CPU and/or memory utilization,
allowing the system to automatically adjust to varying metric collection load.
*/ -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ template "cloudzero-agent.server.fullname" . }}-alloy
  namespace: {{ include "cloudzero-agent.namespace" . }}
  labels:
    {{- include "cloudzero-agent.server.labels" . | nindent 4 }}
  {{- include "cloudzero-agent.generateAnnotations" .Values.defaults.annotations | nindent 2 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ template "cloudzero-agent.server.fullname" . }}
  minReplicas: {{ .Values.alloy.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.alloy.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.alloy.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.alloy.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.alloy.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.alloy.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
{{- end }}
