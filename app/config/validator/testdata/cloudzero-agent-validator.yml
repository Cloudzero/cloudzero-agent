# Sample checker configuration file
versions:
  chart_version: 0.1.0
  agent_version: 0.2.0

logging:
  level: debug
  location: ./cloudzero-agent-validator.log

deployment:
  account_id: 000000000000
  cluster_name: test-cluster
  region: us-west-2

cloudzero:
  host: https://api.cloudzero.com
  credentials_file: ./api_key_file

prometheus:
  kube_state_metrics_service_endpoint: http://kube-state-metrics:8080
  kube_metrics:
    - kube_node_info
    - kube_node_status_capacity
    - kube_pod_container_resource_limits
    - kube_pod_container_resource_requests
    - kube_pod_labels
    - kube_pod_info
    - node_dmi_info
  configurations:
    - prometheus.yml

diagnostics:
  stages:
    - name: pre-start
      checks:
        - name: api_key_valid
          type: required
    - name: post-start
      checks:
        - name: k8s_version
          type: optional
        - name: kube_state_metrics_reachable
          type: optional
        - name: scrape_cfg
          type: optional
    - name: pre-stop
      checks:
        - name: api_key_valid
          type: required
