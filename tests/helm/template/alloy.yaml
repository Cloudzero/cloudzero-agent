data:
  # Alloy River configuration
  alloy-config.river: |-
    // ============================================================================
    // CloudZero Agent - Alloy Configuration
    // Generated by Helm chart version 1.1.0-dev
    // ============================================================================
    //
    // This configuration collects Kubernetes metrics for CloudZero cost allocation.
    // Data flows through discovery -> scrape -> relabel -> remote_write pipelines.
    //
    // Configuration sections:
    // 1. Kube-State-Metrics  - Kubernetes object state (pods, nodes, resources)
    //    OR KubeState Plugin - Same metrics via embedded Alloy plugin (no KSM needed)
    // 2. cAdvisor            - Container resource usage (CPU, memory, network)
    // 3. Webhook             - CloudZero webhook server health (observability)
    // 4. Aggregator          - CloudZero aggregator health (observability)
    // 5. Alloy Self          - Alloy's own metrics (observability)
    // 6. DCGM GPU            - NVIDIA GPU metrics (optional)
    // 7. Remote Write        - Sends all metrics to CloudZero aggregator
    // ============================================================================
    // ============================================================================
    // KUBE-STATE-METRICS SCRAPE JOB
    // ============================================================================
    //
    // Purpose: Collect Kubernetes object state for cost allocation
    //
    // Data flow:
    //   static target -> scrape -> filter metrics -> filter labels -> remote_write
    //
    // Metrics collected:
    //   - kube_node_info, kube_node_status_capacity (node cost attribution)
    //   - kube_pod_info, kube_pod_labels (pod cost attribution)
    //   - kube_pod_container_resource_* (resource requests/limits)
    // ============================================================================
    
    // STEP 1: Scrape KSM endpoint
    // KSM is deployed as a ClusterIP service, so we use a static target
    prometheus.scrape "kube_state_metrics" {
      targets = [{
        __address__ = "cz-agent-cz-ksm.cz-agent.svc.cluster.local:8080",
      }]
      forward_to      = [prometheus.relabel.kube_state_metrics_filter.receiver]
      scrape_interval = "60s"
    
      // Enable clustering for distributed scraping across Alloy replicas
      clustering {
        enabled = true
      }
    }
    
    // STEP 2: Filter metrics - keep only CloudZero cost metrics
    // This reduces data volume by dropping metrics we don't need
    prometheus.relabel "kube_state_metrics_filter" {
      forward_to = [prometheus.relabel.kube_state_metrics_labels.receiver]
    
      rule {
        source_labels = ["__name__"]
        regex         = "^(kube_node_info|kube_node_status_capacity|kube_pod_container_resource_limits|kube_pod_container_resource_requests|kube_pod_labels|kube_pod_info)$"
        action        = "keep"
      }
    }
    
    // STEP 3: Filter labels - keep only labels needed for cost attribution
    // This further reduces data volume and ensures consistent label sets
    prometheus.relabel "kube_state_metrics_labels" {
      forward_to = [prometheus.remote_write.cloudzero.receiver]
    
      rule {
        regex  = "^(board_asset_tag|container|created_by_kind|created_by_name|image|instance|name|namespace|node|node_kubernetes_io_instance_type|pod|product_name|provider_id|resource|unit|uid|_.*|label_.*|app.kubernetes.io/*|k8s.*)$"
        action = "labelkeep"
      }
    }// ============================================================================
    // CADVISOR SCRAPE JOB
    // ============================================================================
    //
    // Purpose: Collect container resource usage for cost allocation
    //
    // Data flow:
    //   discover nodes -> add node label -> scrape -> filter -> remote_write
    //
    // CRITICAL: The node label mapping happens in discovery.relabel because
    // __meta_kubernetes_node_name is only available BEFORE scraping, not after!
    //
    // Metrics collected:
    //   - container_cpu_usage_seconds_total
    //   - container_memory_working_set_bytes
    //   - container_network_receive_bytes_total
    //   - container_network_transmit_bytes_total
    //   - container_resources_gpu_* (if GPU metrics enabled)
    // ============================================================================
    
    // STEP 1: Discover Kubernetes nodes
    // Each node runs a kubelet with cAdvisor integrated at /metrics/cadvisor
    discovery.kubernetes "cadvisor" {
      role = "node"
    }
    // STEP 2: Pre-scrape target relabeling (API SERVER PROXY MODE - default)
    // Route requests through Kubernetes API server at /api/v1/nodes/<node>/proxy/
    // This requires nodes/proxy RBAC permission
    //
    // IMPORTANT: __meta_* labels are ONLY available here, not in prometheus.relabel!
    discovery.relabel "cadvisor" {
      targets = discovery.kubernetes.cadvisor.targets
    
      // Route all requests through the Kubernetes API server
      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc.cluster.local:443"
      }
    
      // Set metrics path to API proxy endpoint for each node
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
      }
    
      // Map node name to "node" label for cost allocation
      // This label identifies which node each metric came from
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
    
      // Copy node labels (e.g., node_kubernetes_io_instance_type for cost correlation)
      // This extracts labels from __meta_kubernetes_node_label_<name> format
      rule {
        regex  = "__meta_kubernetes_node_label_(.+)"
        action = "labelmap"
      }
    }
    
    // STEP 3: Scrape cAdvisor metrics via API server proxy
    // API server forwards requests to kubelets at /api/v1/nodes/<node>/proxy/metrics/cadvisor
    prometheus.scrape "cadvisor" {
      targets         = discovery.relabel.cadvisor.output
      forward_to      = [prometheus.relabel.cadvisor_filter.receiver]
      scrape_interval = "60s"
      scheme          = "https"
    
      // Authentication: Use ServiceAccount token mounted in the pod
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    
      // TLS Configuration:
      // - ca_file: Validates the API server's certificate chain
      // - insecure_skip_verify: Configurable for environments with custom certs
      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
    
      // Enable clustering for distributed scraping across Alloy replicas
      // Each Alloy instance will scrape a subset of nodes
      clustering {
        enabled = true
      }
    }
    
    // STEP 4: Filter metrics - keep only CloudZero cost metrics
    prometheus.relabel "cadvisor_filter" {
      forward_to = [prometheus.relabel.cadvisor_labels.receiver]
    
      rule {
        source_labels = ["__name__"]
        regex         = "^(container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total|container_resources_gpu_usage_percent|container_resources_gpu_memory_usage_percent)$"
        action        = "keep"
      }
    }
    
    // STEP 5: Filter labels - keep only labels needed for cost attribution
    prometheus.relabel "cadvisor_labels" {
      forward_to = [prometheus.remote_write.cloudzero.receiver]
    
      rule {
        regex  = "^(board_asset_tag|container|created_by_kind|created_by_name|image|instance|name|namespace|node|node_kubernetes_io_instance_type|pod|product_name|provider_id|resource|unit|uid|_.*|label_.*|app.kubernetes.io/*|k8s.*)$"
        action = "labelkeep"
      }
    }
    // ============================================================================
    // WEBHOOK SCRAPE JOB
    // ============================================================================
    //
    // Purpose: Monitor CloudZero webhook server health (observability metrics)
    //
    // Data flow:
    //   discover endpointslice -> scrape (HTTPS) -> filter metrics -> remote_write
    //
    // Note: Uses HTTPS with insecure_skip_verify because the webhook server
    // uses a self-signed certificate generated at deployment time.
    // ============================================================================
    
    // STEP 1: Discover webhook service via EndpointSlice
    discovery.kubernetes "webhook" {
      role = "endpointslice"
    
      selectors {
        role  = "endpointslice"
        field = "metadata.name=cz-agent-cz-webhook"
      }
    }
    
    // STEP 2: Scrape webhook metrics over HTTPS
    prometheus.scrape "webhook" {
      targets         = discovery.kubernetes.webhook.targets
      forward_to      = [prometheus.relabel.webhook_filter.receiver]
      scrape_interval = "120s"
      scheme          = "https"
    
      // Skip TLS verification - webhook uses self-signed cert
      tls_config {
        insecure_skip_verify = true
      }
    
      clustering {
        enabled = true
      }
    }
    
    // STEP 3: Filter metrics - keep only observability metrics
    prometheus.relabel "webhook_filter" {
      forward_to = [prometheus.remote_write.cloudzero.receiver]
    
      rule {
        source_labels = ["__name__"]
        regex         = "^(go_memstats_alloc_bytes|go_memstats_heap_alloc_bytes|go_memstats_heap_idle_bytes|go_memstats_heap_inuse_bytes|go_memstats_heap_objects|go_memstats_last_gc_time_seconds|go_memstats_alloc_bytes|go_memstats_stack_inuse_bytes|go_goroutines|process_cpu_seconds_total|process_max_fds|process_open_fds|process_resident_memory_bytes|process_start_time_seconds|process_virtual_memory_bytes|process_virtual_memory_max_bytes|remote_write_timeseries_total|remote_write_response_codes_total|remote_write_payload_size_bytes|remote_write_failures_total|remote_write_records_processed_total|remote_write_db_failures_total|http_requests_total|storage_write_failure_total|czo_webhook_types_total|czo_storage_types_total|czo_ingress_types_total|czo_gateway_types_total)$"
        action        = "keep"
      }
    }
    // ============================================================================
    // AGGREGATOR SCRAPE JOB
    // ============================================================================
    //
    // Purpose: Monitor CloudZero aggregator health (observability metrics)
    //
    // Data flow:
    //   static target -> scrape -> filter metrics -> remote_write
    //
    // The aggregator exposes metrics on its shipper port.
    // ============================================================================
    
    // STEP 1: Scrape aggregator shipper port
    prometheus.scrape "aggregator" {
      targets = [{
        __address__ = "cz-agent-cz-aggregator:8081",
      }]
      forward_to      = [prometheus.relabel.aggregator_filter.receiver]
      scrape_interval = "120s"
    
      clustering {
        enabled = true
      }
    }
    
    // STEP 2: Filter metrics - keep cost + observability metrics
    prometheus.relabel "aggregator_filter" {
      forward_to = [prometheus.remote_write.cloudzero.receiver]
    
      rule {
        source_labels = ["__name__"]
        regex         = "^(container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total|container_resources_gpu_usage_percent|container_resources_gpu_memory_usage_percent|kube_node_info|kube_node_status_capacity|kube_pod_container_resource_limits|kube_pod_container_resource_requests|kube_pod_labels|kube_pod_info|go_gc_duration_seconds|go_gc_duration_seconds_count|go_gc_duration_seconds_sum|go_gc_gogc_percent|go_gc_gomemlimit_bytes|go_goroutines|go_memstats_alloc_bytes|go_memstats_heap_alloc_bytes|go_memstats_heap_idle_bytes|go_memstats_heap_inuse_bytes|go_memstats_heap_objects|go_memstats_last_gc_time_seconds|go_memstats_stack_inuse_bytes|go_threads|http_request_duration_seconds_bucket|http_request_duration_seconds_count|http_request_duration_seconds_sum|http_requests_total|process_cpu_seconds_total|process_max_fds|process_open_fds|process_resident_memory_bytes|process_start_time_seconds|process_virtual_memory_bytes|process_virtual_memory_max_bytes|prometheus_agent_corruptions_total|prometheus_api_remote_read_queries|prometheus_http_requests_total|prometheus_notifications_alertmanagers_discovered|prometheus_notifications_dropped_total|prometheus_remote_storage_bytes_total|prometheus_remote_storage_exemplars_in_total|prometheus_remote_storage_histograms_failed_total|prometheus_remote_storage_histograms_in_total|prometheus_remote_storage_histograms_total|prometheus_remote_storage_metadata_bytes_total|prometheus_remote_storage_metadata_failed_total|prometheus_remote_storage_metadata_retried_total|prometheus_remote_storage_metadata_total|prometheus_remote_storage_samples_dropped_total|prometheus_remote_storage_samples_failed_total|prometheus_remote_storage_samples_in_total|prometheus_remote_storage_samples_total|prometheus_remote_storage_shard_capacity|prometheus_remote_storage_shards|prometheus_remote_storage_shards_desired|prometheus_remote_storage_shards_max|prometheus_remote_storage_shards_min|prometheus_remote_storage_string_interner_zero_reference_releases_total|prometheus_remote_write_wal_storage_active_series|prometheus_sd_azure_cache_hit_total|prometheus_sd_azure_failures_total|prometheus_sd_discovered_targets|prometheus_sd_dns_lookup_failures_total|prometheus_sd_failed_configs|prometheus_sd_file_read_errors_total|prometheus_sd_file_scan_duration_seconds|prometheus_sd_file_watcher_errors_total|prometheus_sd_http_failures_total|prometheus_sd_kubernetes_events_total|prometheus_sd_kubernetes_http_request_duration_seconds|prometheus_sd_kubernetes_http_request_total|prometheus_sd_kubernetes_workqueue_depth|prometheus_sd_kubernetes_workqueue_items_total|prometheus_sd_kubernetes_workqueue_latency_seconds|prometheus_sd_kubernetes_workqueue_longest_running_processor_seconds|prometheus_sd_kubernetes_workqueue_unfinished_work_seconds|prometheus_sd_kubernetes_workqueue_work_duration_seconds|prometheus_sd_received_updates_total|prometheus_sd_updates_delayed_total|prometheus_sd_updates_total|prometheus_target_scrape_pool_reloads_failed_total|prometheus_target_scrape_pool_reloads_total|prometheus_target_scrape_pool_sync_total|prometheus_target_scrape_pools_failed_total|prometheus_target_scrape_pools_total|prometheus_target_sync_failed_total|prometheus_target_sync_length_seconds|promhttp_metric_handler_requests_in_flight|promhttp_metric_handler_requests_total|remote_write_db_failures_total|remote_write_failures_total|remote_write_payload_size_bytes|remote_write_records_processed_total|remote_write_response_codes_total|remote_write_timeseries_total|storage_write_failure_total|czo_webhook_types_total|czo_storage_types_total|czo_ingress_types_total|czo_gateway_types_total|function_execution_seconds|shipper_shutdown_total|shipper_new_files_error_total|shipper_new_files_processing_current|shipper_handle_request_file_count|shipper_handle_request_success_total|shipper_presigned_url_error_total|shipper_replay_request_total|shipper_replay_request_current|shipper_replay_request_file_count|shipper_replay_request_error_total|shipper_replay_request_abandon_files_total|shipper_replay_request_abandon_files_error_total|shipper_disk_total_size_bytes|shipper_current_disk_usage_bytes|shipper_current_disk_usage_percentage|shipper_current_disk_unsent_file|shipper_current_disk_sent_file|shipper_disk_replay_request_current|shipper_disk_cleanup_failure_total|shipper_disk_cleanup_success_total|shipper_disk_cleanup_percentage)$|^(cloudzero_|czo_)"
        action        = "keep"
      }
    }
    // ============================================================================
    // ALLOY SELF-SCRAPE JOB
    // ============================================================================
    //
    // Purpose: Monitor Alloy's own health and performance (observability)
    //
    // Data flow:
    //   add job/instance labels -> scrape localhost -> filter metrics -> remote_write
    //
    // Uses discovery.relabel to set the job name and instance (hostname) labels.
    // ============================================================================
    
    // STEP 1: Create target with identifying labels
    discovery.relabel "alloy" {
      targets = [{
        __address__ = "localhost:9090",
      }]
    
      // Set job label to identify this as Alloy self-metrics
      rule {
        target_label = "job"
        replacement  = "alloy"
      }
    
      // Set instance label to the pod hostname for identification
      rule {
        target_label = "instance"
        replacement  = env("HOSTNAME")
      }
    }
    
    // STEP 2: Scrape Alloy's metrics endpoint
    prometheus.scrape "alloy" {
      targets         = discovery.relabel.alloy.output
      forward_to      = [prometheus.relabel.alloy_filter.receiver]
      scrape_interval = "120s"
    
      clustering {
        enabled = true
      }
    }
    
    // STEP 3: Filter metrics - keep only relevant operational metrics
    prometheus.relabel "alloy_filter" {
      forward_to = [prometheus.remote_write.cloudzero.receiver]
    
      rule {
        source_labels = ["__name__"]
        regex         = "^(go_memstats_alloc_bytes|go_memstats_heap_alloc_bytes|go_memstats_heap_idle_bytes|go_memstats_heap_inuse_bytes|go_memstats_heap_objects|go_memstats_last_gc_time_seconds|go_memstats_alloc_bytes|go_memstats_stack_inuse_bytes|go_goroutines|process_cpu_seconds_total|process_max_fds|process_open_fds|process_resident_memory_bytes|process_start_time_seconds|process_virtual_memory_bytes|process_virtual_memory_max_bytes|prometheus_agent_corruptions_total|prometheus_api_remote_read_queries|prometheus_http_requests_total|prometheus_notifications_alertmanagers_discovered|prometheus_notifications_dropped_total|prometheus_remote_storage_bytes_total|prometheus_remote_storage_histograms_failed_total|prometheus_remote_storage_histograms_total|prometheus_remote_storage_metadata_bytes_total|prometheus_remote_storage_metadata_failed_total|prometheus_remote_storage_metadata_retried_total|prometheus_remote_storage_metadata_total|prometheus_remote_storage_samples_dropped_total|prometheus_remote_storage_samples_failed_total|prometheus_remote_storage_samples_in_total|prometheus_remote_storage_samples_total|prometheus_remote_storage_shard_capacity|prometheus_remote_storage_shards|prometheus_remote_storage_shards_desired|prometheus_remote_storage_shards_max|prometheus_remote_storage_shards_min|prometheus_remote_write_wal_storage_active_series|prometheus_sd_azure_cache_hit_total|prometheus_sd_azure_failures_total|prometheus_sd_discovered_targets|prometheus_sd_dns_lookup_failures_total|prometheus_sd_failed_configs|prometheus_sd_file_read_errors_total|prometheus_sd_file_scan_duration_seconds|prometheus_sd_file_watcher_errors_total|prometheus_sd_http_failures_total|prometheus_sd_kubernetes_events_total|prometheus_sd_kubernetes_http_request_duration_seconds|prometheus_sd_kubernetes_http_request_total|prometheus_sd_kubernetes_workqueue_depth|prometheus_sd_kubernetes_workqueue_items_total|prometheus_sd_kubernetes_workqueue_latency_seconds|prometheus_sd_kubernetes_workqueue_longest_running_processor_seconds|prometheus_sd_kubernetes_workqueue_unfinished_work_seconds|prometheus_sd_kubernetes_workqueue_work_duration_seconds|prometheus_sd_received_updates_total|prometheus_sd_updates_delayed_total|prometheus_sd_updates_total|prometheus_target_scrape_pool_reloads_failed_total|prometheus_target_scrape_pool_reloads_total|prometheus_target_scrape_pool_sync_total|prometheus_target_scrape_pools_failed_total|prometheus_target_scrape_pools_total|prometheus_target_sync_failed_total|prometheus_target_sync_length_seconds)$"
        action        = "keep"
      }
    }
    
    // ============================================================================
    // REMOTE WRITE TO CLOUDZERO AGGREGATOR
    // ============================================================================
    //
    // Purpose: Send all collected metrics to the CloudZero aggregator
    //
    // All scrape jobs forward their filtered metrics here. The aggregator
    // then ships the data to the CloudZero platform for cost analysis.
    //
    // Queue configuration is tuned for reliability and efficiency:
    //   - Large capacity prevents data loss during aggregator hiccups
    //   - Multiple shards enable parallel sending
    //   - Reasonable batch sizes balance latency and throughput
    // ============================================================================
    
    prometheus.remote_write "cloudzero" {
      endpoint {
        url = "http://cz-agent-cz-aggregator.cz-agent.svc.cluster.local/collector"
    
        // Disable metadata - not needed for CloudZero cost metrics
        send_exemplars         = false
        send_native_histograms = false
    
        // Queue configuration for reliable delivery
        queue_config {
          // Maximum number of samples to buffer before blocking new scrapes
          capacity = 10000
    
          // Parallel sender configuration
          // More shards = higher throughput but more connections
          max_shards = 10
          min_shards = 1
    
          // Batch configuration
          // Larger batches are more efficient but increase latency
          max_samples_per_send = 5000
          batch_send_deadline  = "5s"
    
          // Backoff configuration for retries
          min_backoff = "30ms"
          max_backoff = "5s"
        }
      }
    }
