apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: cz-agent
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: server
    app.kubernetes.io/part-of: cloudzero-agent
