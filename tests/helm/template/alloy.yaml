          - daemonsets
          - replicasets
          - pods
          - namespaces
          - nodes
          - services
          - storageclasses
          - persistentvolumes
          - persistentvolumeclaims
          - jobs
          - cronjobs
          - customresourcedefinitions
          - ingresses
          - ingressclasses
          - gateways
          - gatewayclasses
        scope: "*"
    clientConfig:
      service:
        namespace: cz-agent
        name: cz-agent-cz-webhook
        path: /validate
        port: 443
    admissionReviewVersions: ["v1"]
