# Test for valid defaults.env
defaults:
  env:
    - name: "HTTPS_PROXY"
      value: "http://proxy.example.com:8080"
    - name: "MY_SECRET"
      valueFrom:
        secretKeyRef:
          name: "my-secret"
          key: "secret-key"
    - name: "POD_NAME"
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
