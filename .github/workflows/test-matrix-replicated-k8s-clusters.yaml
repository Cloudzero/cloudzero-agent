name: test-matrix-replicated-k8s-clusters

# NOTE: There is a `replicated` CLI should anyone be interested:
# https://docs.replicated.com/reference/replicated-cli-installing

on:
  workflow_dispatch:
    inputs:
      image-repo:
        description: "The registry for the image"
        default: "ghcr.io"
        type: "string"
      image-path:
        description: "The path for the image (no registry, no tag)"
        default: "cloudzero/cloudzero-agent/cloudzero-agent"
        type: "string"
      image-tag:
        description: "The image tag"
        default: "latest"
        type: "string"
  workflow_call:
    inputs:
      image-repo:
        description: "The registry for the image"
        default: "ghcr.io"
        type: "string"
      image-path:
        description: "The path for the image (no registry, no tag)"
        default: "cloudzero/cloudzero-agent/cloudzero-agent"
        type: "string"
      image-tag:
        description: "The image tag"
        default: "latest"
        type: "string"
    outputs:
      cluster-test-status:
        description: "The completion status of the replicated-test job"
        value: ${{ jobs.compatibility-matrix.outputs.cluster-test-status }}

concurrency:
  # This concurrency group ensures that only one job in the group runs at a time.
  # If a new job is triggered, the previous one will be canceled.
  group: matrix-replicated-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility-matrix:
    name: replicated-test-${{ matrix.cluster.distribution }}-${{ matrix.cluster.arch }}-${{ matrix.cluster.version }}
    if: ${{ vars.ENABLE_REPLICATED == 'true' }}
    permissions:
      contents: read
      packages: read
    outputs:
      cluster-test-status: ${{ job.status }}
    strategy:
      fail-fast: false
      matrix:
        # Run 'replicated cluster versions' for a current list of options.
        cluster:
          [
            {
              distribution: rke2,
              version: v1.32.3,
              instance-type: r1.large,
              arch: amd64,
            },
            {
              distribution: eks,
              version: v1.32,
              instance-type: m5.large,
              arch: arm64,
            },
            {
              distribution: eks,
              version: v1.32,
              instance-type: m7g.large,
              arch: amd64,
            },
            {
              distribution: aks,
              version: v1.32,
              instance-type: Standard_D4S_v5,
              arch: amd64,
            },
            {
              distribution: aks,
              version: v1.32,
              instance-type: Standard_D4ps_v5,
              arch: arm64,
            },
            {
              distribution: gke,
              version: v1.32,
              instance-type: e2-standard-2,
              arch: amd64,
            },
            {
              distribution: gke,
              version: v1.32,
              instance-type: t2a-standard-4,
              arch: arm64,
            },
          ]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: |
            make install-tools

      - name: Install Krew and Plugins
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 4
          command: |
            (
              set -x; cd "$(mktemp -d)" &&
              OS="$(uname | tr '[:upper:]' '[:lower:]')" &&
              ARCH="$(uname -m | sed -e 's/x86_64/amd64/' -e 's/\(arm\)\(64\)\?.*/\1\2/' -e 's/aarch64$/arm64/')" &&
              KREW="krew-${OS}_${ARCH}" &&
              curl -fsSLO "https://github.com/kubernetes-sigs/krew/releases/latest/download/${KREW}.tar.gz" &&
              tar zxvf "${KREW}.tar.gz" &&
              ./"${KREW}" install krew
            )
            echo "$HOME/.krew/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.krew/bin:$PATH"
            kubectl krew install stern

      - name: Generate Valid Cluster Name
        run: |
          CNAME="${{ github.ref_name }}-${{ matrix.cluster.distribution }}-${{ matrix.cluster.arch }}-${{ matrix.cluster.version }}"
          CLUSTER_NAME="${CNAME//\//-}"
          echo "CLUSTER_NAME=${CLUSTER_NAME}" >> "$GITHUB_ENV"

      - name: Create Cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: ${{ matrix.cluster.distribution }}
          kubernetes-version: ${{ matrix.cluster.version }}
          cluster-name: ${{ env.CLUSTER_NAME }}
          timeout-minutes: 20 # Some clusters can take this long to spin up.
          instance-type: ${{ matrix.cluster.instance-type }}
          nodes: 1
          ttl: 20m # How long they should stay up after they become available.
          tags: |
            - key: "team"
              value: "cirrus"
            - key: "purpose"
              value: "testing"
            - key: "lifespan"
              value: "ephemeral"

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.create-cluster.outputs.cluster-kubeconfig }}" > ~/.kube/config

      - name: Create cluster configuration files
        run: |
          # Create cluster configuration for this test run
          cat <<EOF > clusters/${{ env.CLUSTER_NAME }}.yaml
          # Cluster configuration for '${{ env.CLUSTER_NAME }}' cluster
          context: ""
          kubeConfig: ""
          namespace: cz-agent
          release: cz-agent
          EOF

          # Create overrides file with test-specific values
          cat <<EOF > clusters/${{ env.CLUSTER_NAME }}-overrides.yaml
          # Test image configuration
          components:
            agent:
              image:
                repository: ${{ inputs.image-repo }}/${{ inputs.image-path }}
                tag: ${{ inputs.image-tag }}

          # Test API configuration  
          cloudAccountId: "123456789012"
          clusterName: "${{ env.CLUSTER_NAME }}"
          region: us-east-1
          host: dev-api.cloudzero.com
          apiKey: ${{ secrets.CLOUDZERO_DEV_API_KEY }}

          # Image pull secrets
          imagePullSecrets:
            - name: ghcr-registry

          # Test-specific settings
          insightsController:
            server:
              replicaCount: 1
          components:
            aggregator:
              replicas: 1
          EOF

      - name: Add CloudZero Agent Tolerations for GKE/ARM64
        if: matrix.cluster.distribution == 'gke' && matrix.cluster.arch == 'arm64'
        run: |
          # Add tolerations to the overrides file for ARM64 GKE clusters
          cat <<EOF >> clusters/${{ env.CLUSTER_NAME }}-overrides.yaml
          defaults:
            tolerations:
              - key: kubernetes.io/arch
                operator: Equal
                value: arm64
                effect: NoSchedule
          kubeStateMetrics:
            tolerations:
              - key: kubernetes.io/arch
                operator: Equal
                value: arm64
                effect: NoSchedule
          EOF

      - name: Set default StorageClass in EKS
        if: matrix.cluster.distribution == 'eks'
        run: |
          kubectl patch storageclass gp2 -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'

      - name: Setup imagePullSecrets
        run: |
          kubectl create ns cz-agent
          kubectl create secret \
            docker-registry \
            ghcr-registry \
            -n cz-agent \
            --docker-server=https://ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}

      - name: Debug Makefile Variables
        run: |
          echo "=== Debugging Makefile Variables ==="
          echo "CLUSTER_NAME: ${{ env.CLUSTER_NAME }}"
          echo "CLUSTER_CONFIG_FILE: clusters/${{ env.CLUSTER_NAME }}.yaml"
          echo "CLUSTER_OVERRIDES_FILE: clusters/${{ env.CLUSTER_NAME }}-overrides.yaml"
          echo "=== Cluster Config File Contents ==="
          cat clusters/${{ env.CLUSTER_NAME }}.yaml
          echo "=== Cluster Overrides File Contents ==="
          cat clusters/${{ env.CLUSTER_NAME }}-overrides.yaml
          echo "=== Testing Makefile Functions ==="
          make -n helm-install CLUSTER_NAME=${{ env.CLUSTER_NAME }}

      - name: Install CloudZero Agent using Makefile
        env:
          CLOUDZERO_DEV_API_KEY: ${{ secrets.CLOUDZERO_DEV_API_KEY }}
        run: |
          make helm-install CLUSTER_NAME=${{ env.CLUSTER_NAME }}

      - name: Wait for CloudZero Agent to be ready
        run: |
          make helm-wait CLUSTER_NAME=${{ env.CLUSTER_NAME }}

      - name: Run KUTTL Tests
        run: |
          make helm-test-kuttl CLUSTER_NAME=${{ env.CLUSTER_NAME }}

      - name: Collect Logs
        id: logs
        if: failure()
        continue-on-error: true
        run: |
          LOG_FILE="${{ runner.temp }}/${{ matrix.cluster.distribution }}-${{ matrix.cluster.arch }}.log"
          rm -f "$LOG_FILE"

          # All log output consolidated into single block to avoid SC2129 warnings
          {
            echo "---Cluster Information------------------------------------------------"
            echo "Cluster: ${{ matrix.cluster.distribution }}-${{ matrix.cluster.arch }}-${{ matrix.cluster.version }}"
            echo "Instance Type: ${{ matrix.cluster.instance-type }}"

            echo "---Kubectl Nodes-------------------------------------------------------"
            kubectl get nodes -o wide || echo "[ERROR] Kubectl get nodes command exited error."

            echo "---Kubectl Storage Info------------------------------------------------"
            kubectl get storageclasses || echo "[ERROR] Kubectl get storageclasses command exited error."
            kubectl get pv -A || echo "[ERROR] Kubectl get pv command exited error."
            kubectl get pvc -A || echo "[ERROR] Kubectl get pvc command exited error."

            echo "---Kubectl Get All-----------------------------------------------------"
            kubectl get all -A || echo "[ERROR] Kubectl get all command exited error."

            echo "---Kubectl Describe All Resources (cloudzero-agent)-------------------"
            kubectl describe all -l app.kubernetes.io/part-of=cloudzero-agent -n cz-agent || echo "[ERROR] Kubectl describe all (cloudzero-agent) command exited error."

            echo "---Kubectl Describe Pods (cz-agent)------------------------------------"
            kubectl describe pods -n cz-agent || echo "[ERROR] Kubectl describe pods (cz-agent) command exited error."

            echo "---Kubectl Describe Deployments (cz-agent)----------------------------"
            kubectl describe deployments -n cz-agent || echo "[ERROR] Kubectl describe deployments (cz-agent) command exited error."

            echo "---Kubectl Describe ReplicaSets (cz-agent)---------------------------"
            kubectl describe replicasets -n cz-agent || echo "[ERROR] Kubectl describe replicasets (cz-agent) command exited error."

            echo "---Kubectl Events (All)------------------------------------------------"
            kubectl events -A || echo "[ERROR] Kubectl events command exited error."

            echo "---Kubectl Events (CloudZero Agent)------------------------------------"
            kubectl events -n cz-agent --sort-by='.lastTimestamp' | grep -E "(cz-agent|cloudzero)" || echo "[ERROR] Kubectl events (cloudzero-agent) command exited error."

            echo "---Kubectl Secrets (cz-agent)-------------------------------------------"
            kubectl get secrets -n cz-agent || echo "[ERROR] Kubectl get secrets (cz-agent) command exited error."

            echo "---Stern Logs (cz-agent)------------------------------------------------"
            kubectl stern -n cz-agent --since=3m --no-follow -t . | sort -k4 || echo "[ERROR] Stern log command exited error."

            echo "---Container Logs (cz-agent)--------------------------------------------"
            kubectl get pods -n cz-agent --no-headers -o name 2>/dev/null | while read -r pod_name; do
              pod_name=$(echo "$pod_name" | cut -d'/' -f2)
              echo "---Logs for pod: $pod_name"
              kubectl logs -n cz-agent "$pod_name" --all-containers=true --previous=false --since=5m 2>&1 || echo "[ERROR] Failed to get logs for pod $pod_name"
            done

            echo "---Previous Container Logs (cz-agent)------------------------------------"
            kubectl get pods -n cz-agent --no-headers -o name 2>/dev/null | while read -r pod_name; do
              pod_name=$(echo "$pod_name" | cut -d'/' -f2)
              echo "---Previous logs for pod: $pod_name"
              kubectl logs -n cz-agent "$pod_name" --all-containers=true --previous=true --since=5m 2>&1 || echo "[ERROR] Failed to get previous logs for pod $pod_name"
            done

            echo "---Container Logs (ALL NAMESPACES)---------------------------------------"
            kubectl get pods -A --no-headers -o name 2>/dev/null | while read -r pod_name; do
              namespace=$(echo "$pod_name" | cut -d'/' -f1)
              pod_name=$(echo "$pod_name" | cut -d'/' -f2)
              echo "---Logs for pod: $namespace/$pod_name"
              kubectl logs -n "$namespace" "$pod_name" --all-containers=true --previous=false --since=5m 2>&1 || echo "[ERROR] Failed to get logs for pod $namespace/$pod_name"
            done

            echo "---Helm Status--------------------------------------------------------"
            helm status cz-agent -n cz-agent || echo "[ERROR] Helm status command exited error."

            echo "---Helm Values--------------------------------------------------------"
            helm get values cz-agent -n cz-agent || echo "[ERROR] Helm get values command exited error."
          } >> "$LOG_FILE"

      - name: Uninstall CloudZero Agent
        if: always()
        run: |
          make helm-uninstall "CLUSTER_NAME=${{ env.CLUSTER_NAME }}" || true

      # It wouldn't be a bad idea to do a security pattern scan of these logs and redact them if a
      # potential secret it detected, since they will be publicly available if uploaded.

      - name: Upload Failure Logs
        uses: actions/upload-artifact@v5
        if: always() && steps.logs.conclusion == 'success'
        with:
          name: ${{ matrix.cluster.distribution }}-${{ matrix.cluster.arch }}.log
          path: ${{ runner.temp }}/${{ matrix.cluster.distribution }}-${{ matrix.cluster.arch }}.log
          retention-days: 1
          if-no-files-found: warn

      - name: Remove Cluster
        if: ${{ always() }}
        id: remove-cluster
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        continue-on-error: true # It could be that the cluster is already removed
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}

      - name: Cleanup
        if: ${{ always() }}
        id: cleanup
        continue-on-error: true
        run: |
          rm -f ~/.kube/config
