name: test-matrix-k8s-versions
on:
  workflow_dispatch:
    inputs:
      image-repo:
        description: "The registry for the image"
        default: "ghcr.io"
        type: "string"
      image-path:
        description: "The path for the image (no registry, no tag)"
        default: "cloudzero/cloudzero-agent/cloudzero-agent"
        type: "string"
      image-tag:
        description: "The image tag"
        default: "latest"
        type: "string"
  workflow_call:
    inputs:
      image-repo:
        description: "The registry for the image"
        default: "ghcr.io"
        type: "string"
      image-path:
        description: "The path for the image (no registry, no tag)"
        default: "cloudzero/cloudzero-agent/cloudzero-agent"
        type: "string"
      image-tag:
        description: "The image tag"
        default: "latest"
        type: "string"
    outputs:
      version-test-status:
        description: "The completion status of the k8s-version-test job"
        value: ${{ jobs.k8s-version-test.outputs.version-test-status }}

concurrency:
  # This concurrency group ensures that only one job in the group runs at a time.
  # If a new job is triggered, the previous one will be canceled.
  group: matrix-kver-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k8s-version-test:
    name: ${{ matrix.kver.platform }}-k8s-test-${{ matrix.kver.k8s }}
    runs-on: ${{ matrix.kver.platform == 'linux/amd64' && 'ubuntu-latest' || matrix.kver.platform == 'linux/arm64' && 'ubuntu-24.04-arm' }}
    # These should match the permissions in the calling job.
    permissions:
      contents: read
      packages: read
    outputs:
      version-test-status: ${{ job.status }}
    strategy:
      fail-fast: false
      matrix:
        # Test against various Kubernetes versions using Kind
        # NOTE: We also switch up the platforms, just to try and catch any image build issues early.
        kver:
          - k8s: v1.21.14
            platform: linux/amd64
          - k8s: v1.22.17
            platform: linux/arm64
          - k8s: v1.23.17
            platform: linux/amd64
          - k8s: v1.24.17
            platform: linux/arm64
          - k8s: v1.25.16
            platform: linux/amd64
          - k8s: v1.26.15
            platform: linux/arm64
          - k8s: v1.27.16
            platform: linux/amd64
          - k8s: v1.28.14
            platform: linux/arm64
          - k8s: v1.29.15
            platform: linux/amd64
          - k8s: v1.30.11
            platform: linux/arm64
          - k8s: v1.31.7
            platform: linux/amd64
          - k8s: v1.32.3
            platform: linux/arm64
          - k8s: v1.33.5
            platform: linux/amd64
          - k8s: v1.34.1
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: azure/setup-kubectl@v4
        with:
          version: ${{ matrix.kver.k8s }}

      - name: Install Krew and Plugins
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 4
          command: |
            (
              set -x; cd "$(mktemp -d)" &&
              OS="$(uname | tr '[:upper:]' '[:lower:]')" &&
              ARCH="$(uname -m | sed -e 's/x86_64/amd64/' -e 's/\(arm\)\(64\)\?.*/\1\2/' -e 's/aarch64$/arm64/')" &&
              KREW="krew-${OS}_${ARCH}" &&
              curl -fsSLO "https://github.com/kubernetes-sigs/krew/releases/latest/download/${KREW}.tar.gz" &&
              tar zxvf "${KREW}.tar.gz" &&
              ./"${KREW}" install krew
            )
            echo "$HOME/.krew/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.krew/bin:$PATH"
            kubectl krew install stern

      - name: Install Dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 4
          command: |
            make install-tools V=1

      - name: Run Complete Chart Tests
        env:
          CLOUDZERO_DEV_API_KEY: ${{ secrets.CLOUDZERO_DEV_API_KEY }}
        run: |
          echo "Running complete chart tests using Kind..."
          # Create unique cluster name based on matrix (using valid characters only)
          CLUSTER_NAME="kind-${{ matrix.kver.platform == 'linux/amd64' && 'amd64' || matrix.kver.platform == 'linux/arm64' && 'arm64' || matrix.kver.platform }}-${{ matrix.kver.k8s }}"
          # Clean up any existing cluster using Make target
          make kind-down "CLUSTER_NAME=$CLUSTER_NAME" V=1 || true
          # Create cluster configuration files for this test run
          cp clusters/kind.yaml "clusters/$CLUSTER_NAME.yaml"
          cp clusters/kind-overrides.yaml "clusters/$CLUSTER_NAME-overrides.yaml"
          # Run the complete test workflow using Kind
          make kind-test "CLUSTER_NAME=$CLUSTER_NAME" V=1

      - name: Set version output
        id: set-output
        run: |
          {
            echo "kubeconfig=tests/kuttl/kubeconfig"
            echo "k8s-version=${{ matrix.kver.k8s }}"
            echo "kubectl-version=$(kubectl version --client | grep Client | cut -d ' ' -f 3)"
            echo "helm-version=$(helm version --short | sed 's/\([^+]*\).*/\1/')"
          } >> "$GITHUB_OUTPUT"

      # kind-test handles all the installation and testing

      - name: Collect Logs
        id: logs
        if: failure()
        continue-on-error: true
        run: |
          rm -f ${{ runner.temp }}/${{ matrix.kver.k8s }}.log
          touch ${{ runner.temp }}/${{ matrix.kver.k8s }}.log
          echo "---Kubectl Get All-----------------------------------------------------" &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log
          kubectl get all -A &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log || echo "[ERROR] Kubectl get all command exited error." &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log
          echo "---Kubectl Events------------------------------------------------------" &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log
          kubectl events -A &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log || echo "[ERROR] Kubectl events command exited error." &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log
          echo "---Stern Logs (cz-agent)------------------------------------------------" &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log
          kubectl stern -n cz-agent --since=3m --no-follow -t . | sort -k4 &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log || echo "[ERROR] Stern log command exited error." &>> ${{ runner.temp }}/${{ matrix.kver.k8s }}.log

      - name: Upload Failure Logs
        uses: actions/upload-artifact@v7
        if: always() && steps.logs.conclusion == 'success'
        with:
          name: ${{ matrix.kver.k8s }}.log
          path: ${{ runner.temp }}/${{ matrix.kver.k8s }}.log
          retention-days: 1
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up Kind cluster..."
          CLUSTER_NAME="kind-${{ matrix.kver.platform == 'linux/amd64' && 'amd64' || matrix.kver.platform == 'linux/arm64' && 'arm64' || matrix.kver.platform }}-${{ matrix.kver.k8s }}"
          # kind-test handles its own cleanup, but ensure cluster is deleted using Make target
          make kind-down CLUSTER_NAME=$CLUSTER_NAME V=1 || true

  specialized-config-test:
    name: config-test-${{ matrix.config.name }}
    runs-on: ubuntu-latest
    # These should match the permissions in the calling job.
    permissions:
      contents: read
      packages: read
    outputs:
      config-test-status: ${{ job.status }}
    strategy:
      fail-fast: false
      matrix:
        # Test specialized configurations that require different Helm values
        config:
          - name: "federated-mode"
            description: "CloudZero Agent in federated mode with DaemonSet deployment"
            overrides: |
              defaults:
                federation:
                  enabled: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: azure/setup-kubectl@v4

      - name: Install Krew and Plugins
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 4
          command: |
            (
              set -x; cd "$(mktemp -d)" &&
              OS="$(uname | tr '[:upper:]' '[:lower:]')" &&
              ARCH="$(uname -m | sed -e 's/x86_64/amd64/' -e 's/\(arm\)\(64\)\?.*/\1\2/' -e 's/aarch64$/arm64/')" &&
              KREW="krew-${OS}_${ARCH}" &&
              curl -fsSLO "https://github.com/kubernetes-sigs/krew/releases/latest/download/${KREW}.tar.gz" &&
              tar zxvf "${KREW}.tar.gz" &&
              ./"${KREW}" install krew
            )
            echo "$HOME/.krew/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.krew/bin:$PATH"
            kubectl krew install stern

      - name: Install Dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 4
          command: |
            make install-tools V=1

      - name: Create Specialized Configuration Override File
        run: |
          echo "Creating specialized configuration override file for ${{ matrix.config.name }}..."
          # Create temporary file for extra overrides
          EXTRA_OVERRIDES_FILE="${{ runner.temp }}/extra-overrides-${{ matrix.config.name }}.yaml"
          cat <<'EOF' > "$EXTRA_OVERRIDES_FILE"
          ${{ matrix.config.overrides }}
          EOF
          echo "HELM_EXTRA_OVERRIDES=$EXTRA_OVERRIDES_FILE" >> "$GITHUB_ENV"
          echo "Created override file at: $EXTRA_OVERRIDES_FILE"
          echo "Contents:"
          cat "$EXTRA_OVERRIDES_FILE"

      - name: Run Chart Tests with Specialized Configuration
        env:
          CLOUDZERO_DEV_API_KEY: ${{ secrets.CLOUDZERO_DEV_API_KEY }}
        run: |
          echo "Running chart tests with specialized configuration: ${{ matrix.config.name }}"
          echo "Description: ${{ matrix.config.description }}"
          # Create unique cluster name for this configuration test
          CLUSTER_NAME="kind-config-${{ matrix.config.name }}"
          # Clean up any existing cluster using Make target
          make kind-down CLUSTER_NAME=$CLUSTER_NAME V=1 || true
          # Create cluster configuration files for this test run
          cp clusters/kind.yaml "clusters/$CLUSTER_NAME.yaml"
          cp clusters/kind-overrides.yaml "clusters/$CLUSTER_NAME-overrides.yaml"
          # Run the complete test workflow using Kind with extra overrides
          make kind-test "CLUSTER_NAME=$CLUSTER_NAME" "HELM_EXTRA_OVERRIDES=$HELM_EXTRA_OVERRIDES" V=1

      - name: Set config output
        id: set-output
        run: |
          {
            echo "kubeconfig=tests/kuttl/kubeconfig"
            echo "config-name=${{ matrix.config.name }}"
            echo "config-description=${{ matrix.config.description }}"
          } >> "$GITHUB_OUTPUT"

      - name: Collect Logs
        id: logs
        if: failure()
        continue-on-error: true
        run: |
          rm -f "${{ runner.temp }}/${{ matrix.config.name }}.log"
          touch "${{ runner.temp }}/${{ matrix.config.name }}.log"
          echo "---Kubectl Get All-----------------------------------------------------" &>> ${{ runner.temp }}/${{ matrix.config.name }}.log
          kubectl get all -A &>> ${{ runner.temp }}/${{ matrix.config.name }}.log || echo "[ERROR] Kubectl get all command exited error." &>> ${{ runner.temp }}/${{ matrix.config.name }}.log
          echo "---Kubectl Events------------------------------------------------------" &>> ${{ runner.temp }}/${{ matrix.config.name }}.log
          kubectl events -A &>> ${{ runner.temp }}/${{ matrix.config.name }}.log || echo "[ERROR] Kubectl events command exited error." &>> ${{ runner.temp }}/${{ matrix.config.name }}.log
          echo "---Stern Logs (im-a-namespace)----------------------------------------" &>> ${{ runner.temp }}/${{ matrix.config.name }}.log
          kubectl stern -n im-a-namespace --since=3m --no-follow -t . | sort -k4 &>> ${{ runner.temp }}/${{ matrix.config.name }}.log || echo "[ERROR] Stern log command exited error." &>> ${{ runner.temp }}/${{ matrix.config.name }}.log

      - name: Upload Failure Logs
        uses: actions/upload-artifact@v7
        if: always() && steps.logs.conclusion == 'success'
        with:
          name: config-${{ matrix.config.name }}.log
          path: ${{ runner.temp }}/${{ matrix.config.name }}.log
          retention-days: 1
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up Kind cluster..."
          CLUSTER_NAME="kind-config-${{ matrix.config.name }}"
          # kind-test handles its own cleanup, but ensure cluster is deleted using Make target
          make kind-down CLUSTER_NAME=$CLUSTER_NAME V=1 || true
          # Clean up temporary override file
          rm -f "$HELM_EXTRA_OVERRIDES" || true
