name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * FRI'

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v41.0.22
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
