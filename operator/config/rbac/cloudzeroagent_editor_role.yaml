# This rule is not used by the project cloudzero-agent-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the agent.cloudzero.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cloudzero-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: cloudzeroagent-editor-role
rules:
- apiGroups:
  - agent.cloudzero.com
  resources:
  - cloudzeroagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agent.cloudzero.com
  resources:
  - cloudzeroagents/status
  verbs:
  - get
