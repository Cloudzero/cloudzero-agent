---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - agent.cloudzero.com
  resources:
  - cloudzeroagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agent.cloudzero.com
  resources:
  - cloudzeroagents/finalizers
  verbs:
  - update
- apiGroups:
  - agent.cloudzero.com
  resources:
  - cloudzeroagents/status
  verbs:
  - get
  - patch
  - update
