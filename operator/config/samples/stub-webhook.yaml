apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: test-release-cz-webhook
webhooks:
  - name: test-release-cz-webhook.test-ns.svc
    failurePolicy: Ignore
    rules:
      - operations: ["CREATE", "UPDATE", "DELETE"]
        apiGroups: ["*"]
        apiVersions: ["*"]
        resources: ["pods"]
        scope: "*"
    clientConfig:
      service:
        namespace: test-ns
        name: test-release-cz-webhook
        path: /validate
        port: 443
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 1
